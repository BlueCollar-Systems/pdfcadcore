name: core-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: core-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all Python modules
        run: python -m compileall pdfcadcore tools

      - name: Install ruff
        run: pip install ruff

      - name: Lint (functional + bugbear)
        run: ruff check --select F,B pdfcadcore tools

      - name: Install dependencies
        run: pip install "PyMuPDF>=1.24,<2.0" pytest

      - name: Run unit tests
        run: python -m pytest tests -q

      # The Tier-1 regression guard needs the local PDF corpus
      # (BCS_CORPUS_ROOT) and stays a local/dev gate until a
      # redistributable corpus subset is settled (Q&A Q-08-b).
      - name: Guard self-check (no corpus on CI)
        run: python tools/regression_guard.py --help
